<style>
  :root {
    --forest: #2D5016;
    --deep-green: #1A3A0A;
    --gold: #C4A35A;
    --cream: #F3F8F1;
    --charcoal: #282828;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--cream);
    color: var(--charcoal);

    font-size: 7rem;
    font-weight: 800;
    color: var(--forest);

    letter-spacing: -0.04em;
  }
  .code em {
    font-style: italic;
    font-family: 'Instrument Serif', serif;

    font-size: 1.15rem;

    max-width: 420px;
    line-height: 1.6;

    font-size: 15px;
